<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Smart Grocery Store Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/payment.css') }}"/>
</head>
<body>
<header>
    <div class="main">
        <div class="logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}">
            <h2>ShopiBot</h2>
        </div>
        <nav>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('cart') }}">Cart</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </nav>
    </div>
</header>

<section>
    <div class="login">
        <h2>Select Your Payment Method</h2>
        <div class="form">
            <form method="POST" action="/payment">
                <!-- Cash on Delivery Option -->
                <label>
                    <input type="radio" name="paymentMethod" value="CashOnDelivery" required/> Cash on Delivery
                </label>

                <!-- UPI Payment Option -->
                <label>
                    <input type="radio" name="paymentMethod" value="upi" required/> UPI / QR Code (Google Pay / PhonePe)
                </label>

                <!-- Show UPI Payment Button -->
            <!-- Show UPI Payment Section -->
<div id="upiSection" style="display:none; margin-top:15px; text-align:center;">
    <!-- QR Code Image -->
    <img src="{{ url_for('static', filename='images/scanner.jpg') }}" 
         alt="Scan to Pay" 
         style="width:200px; height:200px; margin-bottom:10px; border:1px solid #ccc; border-radius:10px;">
    
    <!-- Pay Now Button -->
    <button type="button" onclick="makePayment()">Pay Now</button>
</div>

                <!-- Submit -->
                <button type="submit">Continue</button>
            </form>
        </div>
    </div>
</section>

<footer>
    <div class="footer">
        <p>© 2025 Smart Grocery Assistant</p>
    </div>
</footer>

<script>
    // Show UPI button only if UPI is selected
    document.querySelectorAll('input[name="paymentMethod"]').forEach((radio) => {
        radio.addEventListener('change', function() {
            if (this.value === 'upi') {
                document.getElementById('upiSection').style.display = 'block';
            } else {
                document.getElementById('upiSection').style.display = 'none';
            }
        });
    });

    // UPI Payment Function
    function makePayment() {
    let amount = prompt("Enter Bill Amount:");
    let billAmount = {{ session.get("total_bill", 0) }}; // Flask se amount aayega

    if(amount && !isNaN(amount) && amount > 0) {
        if(parseFloat(amount) < billAmount) {
            alert(`Amount should be at least ₹${billAmount}`);
            return;
        }
        let upiId = "9215667835@okbizaxis";
        let name = "Anju Devi";
        let note = "Shop Payment";
        let url = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(name)}&am=${amount}&cu=INR&tn=${encodeURIComponent(note)}`;
        window.location.href = url;
    } else {
        alert("Please enter a valid amount.");
    }
}

</script>

</body>
</html>
